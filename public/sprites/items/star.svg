  <circle cx="16" cy="24" r="3" fill="#f9ca24" opacity="0.6"/>
  <circle cx="10" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="118" cy="84" r="3" fill="#f9ca24" opacity="0.6"/>
  <circle cx="48" cy="116" r="2" fill="white" opacity="0.6"/>
  <circle cx="80" cy="120" r="3" fill="#f9ca24" opacity="0.5"/>
