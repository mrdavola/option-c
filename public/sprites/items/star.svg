  <path d="M22 52 L23.5 48 L25 52 L29 53.5 L25 55 L23.5 59 L22 55 L18 53.5 Z" fill="#fff7c0" opacity="0.8"/>
  <path d="M100 100 L101 96 L102 100 L106 101 L102 102 L101 106 L100 102 L96 101 Z" fill="#fff7c0" opacity="0.7"/>
</svg>
