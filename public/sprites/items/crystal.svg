  <circle cx="100" cy="32" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="112" cy="80" r="2" fill="#7ee8ff" opacity="0.5"/>
  <circle cx="16" cy="75" r="2" fill="white" opacity="0.5"/>
