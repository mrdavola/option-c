  <line x1="60" y1="20" x2="68" y2="20" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="56" y1="38" x2="72" y2="38" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Sparkle at tip -->
  <path d="M64 4 L65.5 8 L70 8 L66.5 10.5 L68 15 L64 12 L60 15 L61.5 10.5 L58 8 L62.5 8 Z" fill="white"/>
