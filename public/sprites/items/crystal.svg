  <!-- Crystal cluster - main large crystal -->
  <polygon points="64,8 80,50 72,115 56,115 48,50" fill="#00c8ff"/>
  <polygon points="64,8 80,50 72,115 64,110" fill="#7ee8ff" opacity="0.6"/>
