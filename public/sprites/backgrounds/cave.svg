<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="caveGlow1" cx="40%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00bfff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="caveGlow2" cx="70%" cy="60%" r="28%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cavefloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a08;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a04;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Cave walls (dark rock) -->
  <rect width="800" height="600" fill="#0d0a0a"/>
  <!-- Rock texture bg -->
  <ellipse cx="150" cy="300" rx="200" ry="350" fill="#150e0e"/>
  <ellipse cx="650" cy="300" rx="200" ry="350" fill="#150e0e"/>
  <!-- Crystal glow light sources -->
  <ellipse cx="320" cy="420" rx="240" ry="200" fill="url(#caveGlow1)"/>
  <ellipse cx="580" cy="380" rx="180" ry="160" fill="url(#caveGlow2)"/>
  <!-- Cave ceiling stalactites -->
  <!-- Far row (smaller) -->
  <polygon points="50,0 38,80 62,80" fill="#1e1414"/>
  <polygon points="120,0 106,65 134,65" fill="#1e1414"/>
  <polygon points="200,0 188,90 212,90" fill="#1a1010"/>
  <polygon points="280,0 265,70 295,70" fill="#1e1414"/>
  <polygon points="360,0 348,85 372,85" fill="#1a1010"/>
  <polygon points="440,0 425,75 455,75" fill="#1e1414"/>
  <polygon points="520,0 506,88 534,88" fill="#1a1010"/>
  <polygon points="600,0 586,72 614,72" fill="#1e1414"/>
  <polygon points="680,0 665,82 695,82" fill="#1a1010"/>
  <polygon points="760,0 744,68 776,68" fill="#1e1414"/>
  <!-- Main row (larger) -->
  <polygon points="80,0 58,140 102,140" fill="#241818"/>
  <polygon points="170,0 148,120 192,120" fill="#1e1414"/>
  <polygon points="250,0 224,160 276,160" fill="#281c1c"/>
  <polygon points="340,0 316,130 364,130" fill="#1e1414"/>
  <polygon points="460,0 434,148 486,148" fill="#281c1c"/>
  <polygon points="550,0 524,118 576,118" fill="#1e1414"/>
  <polygon points="640,0 614,155 666,155" fill="#281c1c"/>
  <polygon points="730,0 706,125 754,125" fill="#1e1414"/>
  <!-- Crystal clusters - left wall -->
  <!-- Cyan crystal cluster -->
  <polygon points="80,320 90,200 100,320" fill="#00bfff"/>
  <polygon points="80,320 90,200 100,320" fill="#7ee8ff" opacity="0.4"/>
  <polygon points="68,340 80,230 90,340" fill="#0090d0"/>
  <polygon points="98,330 108,220 118,330" fill="#00a8e8"/>
  <polygon points="112,345 120,250 130,345" fill="#00bfff" opacity="0.8"/>
  <!-- Small crystals left -->
  <polygon points="40,400 46,340 52,400" fill="#00bfff" opacity="0.7"/>
  <polygon points="52,395 56,348 62,395" fill="#7ee8ff" opacity="0.6"/>
  <!-- Crystal clusters - right wall -->
  <!-- Purple crystal cluster -->
  <polygon points="680,310 690,190 700,310" fill="#9b59b6"/>
  <polygon points="680,310 690,190 700,310" fill="#c39bd3" opacity="0.4"/>
  <polygon points="668,330 678,220 690,330" fill="#7d3c98"/>
  <polygon points="698,320 708,210 718,320" fill="#8e44ad"/>
  <polygon points="714,335 722,240 732,335" fill="#9b59b6" opacity="0.8"/>
