  <ellipse cx="100" cy="545" rx="50" ry="12" fill="#00bfff" opacity="0.15"/>
  <ellipse cx="370" cy="558" rx="70" ry="16" fill="#00bfff" opacity="0.12"/>
  <ellipse cx="700" cy="545" rx="55" ry="13" fill="#9b59b6" opacity="0.15"/>
  <!-- Cave pool of water -->
  <ellipse cx="400" cy="560" rx="180" ry="40" fill="#003a5c"/>
  <ellipse cx="400" cy="555" rx="175" ry="35" fill="#004a6e" opacity="0.8"/>
  <!-- Pool reflections -->
  <line x1="350" y1="550" x2="380" y2="552" stroke="#00bfff" stroke-width="2" opacity="0.3"/>
  <line x1="420" y1="545" x2="450" y2="548" stroke="#9b59b6" stroke-width="2" opacity="0.3"/>
  <!-- Stalagmites from floor -->
  <polygon points="140,600 150,480 160,600" fill="#241818"/>
  <polygon points="200,600 212,510 224,600" fill="#1e1414"/>
  <polygon points="580,600 592,500 604,600" fill="#241818"/>
  <polygon points="640,600 650,520 662,600" fill="#1e1414"/>
  <!-- Cave floor -->
  <path d="M0 540 Q100 530 200 538 Q300 546 400 535 Q500 524 600 536 Q700 548 800 538 L800 600 L0 600 Z" fill="url(#cavefloor)"/>
  <!-- Pebbles -->
  <ellipse cx="200" cy="568" rx="16" ry="7" fill="#241818"/>
  <ellipse cx="550" cy="572" rx="12" ry="5" fill="#2a1e1e"/>
  <ellipse cx="680" cy="565" rx="18" ry="8" fill="#241818"/>
  <!-- Glow sparkles from crystals -->
  <circle cx="92" cy="280" r="3" fill="white" opacity="0.8"/>
  <circle cx="108" cy="260" r="2" fill="#7ee8ff" opacity="0.9"/>
  <circle cx="690" cy="270" r="3" fill="white" opacity="0.7"/>
  <circle cx="710" cy="250" r="2" fill="#c39bd3" opacity="0.9"/>
  <circle cx="362" cy="380" r="4" fill="white" opacity="0.8"/>
  <circle cx="380" cy="365" r="2.5" fill="#7ee8ff" opacity="0.9"/>
  <!-- Glowing mushrooms at base -->
  <circle cx="160" cy="540" r="8" fill="#aaf04a" opacity="0.7"/>
  <circle cx="160" cy="530" r="14" fill="#6bcb77" opacity="0.6"/>
  <circle cx="620" cy="538" r="7" fill="#aaf04a" opacity="0.65"/>
  <circle cx="620" cy="529" r="12" fill="#6bcb77" opacity="0.55"/>
