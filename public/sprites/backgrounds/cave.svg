  <polygon points="340,520 355,360 370,520" fill="#00bfff"/>
  <polygon points="340,520 355,360 370,520" fill="#7ee8ff" opacity="0.4"/>
  <polygon points="322,530 338,390 354,530" fill="#0090d0"/>
  <polygon points="368,525 382,400 396,525" fill="#9b59b6"/>
  <polygon points="368,525 382,400 396,525" fill="#c39bd3" opacity="0.4"/>
  <polygon points="396,530 410,410 424,530" fill="#8e44ad"/>
