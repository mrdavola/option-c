  <rect x="60" y="180" width="90" height="420" rx="10" fill="#2d1a08"/>
  <!-- Bark texture -->
  <path d="M80 200 Q90 220 80 240 Q90 260 80 280 Q90 300 80 320" fill="none" stroke="#3d2a18" stroke-width="5" opacity="0.6"/>
  <path d="M120 210 Q110 230 120 250 Q110 270 120 290" fill="none" stroke="#3d2a18" stroke-width="4" opacity="0.5"/>
  <!-- Left tree canopy layers -->
  <ellipse cx="105" cy="180" rx="95" ry="60" fill="#1a4a0a"/>
  <ellipse cx="90" cy="150" rx="80" ry="52" fill="#1e5a0e"/>
  <ellipse cx="110" cy="120" rx="70" ry="46" fill="#236a12"/>
  <ellipse cx="98" cy="92" rx="60" ry="40" fill="#2d8a1b"/>
  <!-- Right giant tree -->
  <rect x="650" y="180" width="90" height="420" rx="10" fill="#2d1a08"/>
  <ellipse cx="695" cy="180" rx="95" ry="60" fill="#1a4a0a"/>
  <ellipse cx="710" cy="150" rx="80" ry="52" fill="#1e5a0e"/>
  <ellipse cx="690" cy="120" rx="70" ry="46" fill="#236a12"/>
  <ellipse cx="702" cy="92" rx="60" ry="40" fill="#2d8a1b"/>
  <!-- Glowing mushrooms on ground -->
  <ellipse cx="220" cy="572" rx="24" ry="8" fill="#aaf04a" opacity="0.4"/>
  <path d="M220 572 Q208 552 210 540 Q214 528 220 528 Q226 528 230 540 Q232 552 220 572 Z" fill="#3daa2b"/>
  <ellipse cx="220" cy="540" rx="24" ry="10" fill="#6bcb77"/>
  <circle cx="214" cy="537" r="3" fill="white" opacity="0.7"/>
  <circle cx="224" cy="535" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="218" cy="543" r="2" fill="white" opacity="0.5"/>
  <circle cx="220" cy="572" rx="24" ry="8" fill="#aaf04a" opacity="0.4"/>
  <!-- Second mushroom -->
  <ellipse cx="600" cy="568" rx="20" ry="7" fill="#aaf04a" opacity="0.4"/>
  <path d="M600 568 Q590 550 592 540 Q596 530 600 530 Q604 530 608 540 Q610 550 600 568 Z" fill="#3daa2b"/>
  <ellipse cx="600" cy="540" rx="20" ry="8" fill="#6bcb77"/>
