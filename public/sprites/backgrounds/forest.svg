  <path d="M150 220 Q155 270 148 320 Q153 370 148 420" fill="none" stroke="#3d6a1b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M680" y1="220" Q685 280 678 340 Q682 400 676 460" fill="none" stroke="#3d6a1b" stroke-width="3" opacity="0.8"/>
  <line x1="680" y1="220" x2="680" y2="460" stroke="#3d6a1b" stroke-width="3" opacity="0.8"/>
  <!-- Ground with roots -->
  <path d="M0 520 Q200 510 400 518 Q600 526 800 515 L800 600 L0 600 Z" fill="#1a0e04"/>
  <!-- Ground foliage -->
  <ellipse cx="300" cy="540" rx="80" ry="30" fill="#1a4a0a"/>
  <ellipse cx="500" cy="545" rx="70" ry="25" fill="#1e5a0e"/>
  <ellipse cx="400" cy="535" rx="60" ry="20" fill="#2d6a1b"/>
  <!-- Glowing path -->
  <path d="M350 600 Q380 575 400 550 Q420 525 430 500" fill="none" stroke="#aaf04a" stroke-width="4" opacity="0.3"/>
  <path d="M350 600 Q380 575 400 550 Q420 525 430 500" fill="none" stroke="#f9ca24" stroke-width="2" opacity="0.2"/>
</svg>
