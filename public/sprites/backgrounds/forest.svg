<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="forestsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2d1b5e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a2d0e;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fffde7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fffde7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="600" fill="url(#forestsky)"/>
  <!-- Moon -->
  <circle cx="650" cy="100" r="50" fill="url(#moonGlow)"/>
  <circle cx="650" cy="100" r="38" fill="#fffde7"/>
  <circle cx="638" cy="92" r="10" fill="#f5f0c0" opacity="0.5"/>
  <circle cx="656" cy="108" r="7" fill="#f5f0c0" opacity="0.4"/>
  <!-- Stars -->
  <circle cx="100" cy="60" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="320" cy="50" r="2" fill="white" opacity="0.9"/>
  <circle cx="420" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="520" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="120" r="1" fill="white" opacity="0.8"/>
  <circle cx="160" cy="90" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="280" cy="80" r="1" fill="white" opacity="0.7"/>
  <circle cx="480" cy="80" r="2" fill="#fff9c4" opacity="0.8"/>
  <circle cx="580" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="730" cy="60" r="1" fill="white" opacity="0.8"/>
  <circle cx="780" cy="90" r="1.5" fill="white" opacity="0.6"/>
  <!-- Fireflies -->
  <circle cx="380" cy="300" r="3" fill="#f9ca24" opacity="0.8"/>
  <circle cx="380" cy="300" r="8" fill="#f9ca24" opacity="0.2"/>
  <circle cx="480" cy="350" r="3" fill="#aaf04a" opacity="0.7"/>
  <circle cx="480" cy="350" r="8" fill="#aaf04a" opacity="0.15"/>
  <circle cx="280" cy="380" r="2.5" fill="#f9ca24" opacity="0.6"/>
  <circle cx="280" cy="380" r="7" fill="#f9ca24" opacity="0.15"/>
  <circle cx="560" cy="320" r="3" fill="#aaf04a" opacity="0.75"/>
  <circle cx="560" cy="320" r="8" fill="#aaf04a" opacity="0.15"/>
  <circle cx="200" cy="420" r="2" fill="#f9ca24" opacity="0.6"/>
  <circle cx="620" cy="400" r="2.5" fill="#f9ca24" opacity="0.7"/>
  <!-- Background trees (darkest) -->
  <rect x="0" y="200" width="60" height="400" fill="#1a0a0a"/>
  <polygon points="30,60 -10,220 70,220" fill="#0d0520"/>
  <polygon points="30,100 -15,230 75,230" fill="#0d0520"/>
  <rect x="740" y="200" width="60" height="400" fill="#1a0a0a"/>
  <polygon points="770,60 730,220 810,220" fill="#0d0520"/>
  <polygon points="770,100 725,230 815,230" fill="#0d0520"/>
  <!-- Mid background trees -->
  <rect x="100" y="250" width="50" height="350" fill="#1e0e0e"/>
  <polygon points="125,100 82,270 168,270" fill="#14082a"/>
  <polygon points="125,140 78,280 172,280" fill="#14082a"/>
  <polygon points="125,180 80,290 170,290" fill="#140829"/>
  <rect x="620" y="250" width="50" height="350" fill="#1e0e0e"/>
  <polygon points="645,100 602,270 688,270" fill="#14082a"/>
  <polygon points="645,140 598,280 692,280" fill="#14082a"/>
  <!-- Ancient trees (massive, midground) -->
