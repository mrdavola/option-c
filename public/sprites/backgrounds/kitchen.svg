  <rect x="0" y="386" width="800" height="6" fill="#a08060" opacity="0.6"/>
  <!-- Counter cabinet doors -->
  <rect x="10" y="400" width="140" height="140" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="80" cy="470" r="7" fill="#c9a84c"/>
  <rect x="160" y="400" width="140" height="140" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="230" cy="470" r="7" fill="#c9a84c"/>
  <rect x="490" y="400" width="140" height="140" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="560" cy="470" r="7" fill="#c9a84c"/>
  <rect x="640" y="400" width="150" height="140" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="715" cy="470" r="7" fill="#c9a84c"/>
  <!-- Stove (center) -->
  <rect x="310" y="360" width="180" height="240" fill="#4a4a5a"/>
  <rect x="318" y="368" width="164" height="100" rx="4" fill="#3a3a4a"/>
