<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="kitchenwall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5e8d8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="counter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0d0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8b898;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Wall -->
  <rect width="800" height="600" fill="url(#kitchenwall)"/>
  <!-- Tile backsplash -->
  <rect x="0" y="240" width="800" height="120" fill="#d0e8f0"/>
  <!-- Tile grid -->
  <line x1="0" y1="240" x2="800" y2="240" stroke="white" stroke-width="3"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="white" stroke-width="3"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="white" stroke-width="3"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="white" stroke-width="3"/>
  <line x1="0" y1="240" x2="0" y2="360" stroke="white" stroke-width="3"/>
  <line x1="80" y1="240" x2="80" y2="360" stroke="white" stroke-width="3"/>
  <line x1="160" y1="240" x2="160" y2="360" stroke="white" stroke-width="3"/>
  <line x1="240" y1="240" x2="240" y2="360" stroke="white" stroke-width="3"/>
  <line x1="320" y1="240" x2="320" y2="360" stroke="white" stroke-width="3"/>
  <line x1="400" y1="240" x2="400" y2="360" stroke="white" stroke-width="3"/>
  <line x1="480" y1="240" x2="480" y2="360" stroke="white" stroke-width="3"/>
  <line x1="560" y1="240" x2="560" y2="360" stroke="white" stroke-width="3"/>
  <line x1="640" y1="240" x2="640" y2="360" stroke="white" stroke-width="3"/>
  <line x1="720" y1="240" x2="720" y2="360" stroke="white" stroke-width="3"/>
  <line x1="800" y1="240" x2="800" y2="360" stroke="white" stroke-width="3"/>
  <!-- Decorative tiles (blue pattern) -->
  <circle cx="40" cy="260" r="12" fill="#4d96ff" opacity="0.3"/>
  <circle cx="200" cy="300" r="12" fill="#4d96ff" opacity="0.3"/>
  <circle cx="360" cy="260" r="12" fill="#4d96ff" opacity="0.3"/>
  <circle cx="520" cy="300" r="12" fill="#4d96ff" opacity="0.3"/>
  <circle cx="680" cy="260" r="12" fill="#4d96ff" opacity="0.3"/>
  <!-- Upper cabinets -->
  <rect x="0" y="0" width="280" height="240" rx="0" fill="#8b6914"/>
  <rect x="0" y="0" width="280" height="240" rx="0" fill="#a07a20" opacity="0.4"/>
  <!-- Cabinet doors (left) -->
  <rect x="10" y="10" width="120" height="108" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <rect x="18" y="18" width="104" height="92" rx="3" fill="#b08a28" opacity="0.4"/>
  <circle cx="70" cy="64" r="6" fill="#c9a84c"/>
  <rect x="140" y="10" width="130" height="108" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="205" cy="64" r="6" fill="#c9a84c"/>
  <rect x="10" y="128" width="120" height="104" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="70" cy="180" r="6" fill="#c9a84c"/>
  <rect x="140" y="128" width="130" height="104" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="205" cy="180" r="6" fill="#c9a84c"/>
  <!-- Right upper cabinets -->
  <rect x="520" y="0" width="280" height="240" fill="#8b6914"/>
  <rect x="530" y="10" width="120" height="108" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="590" cy="64" r="6" fill="#c9a84c"/>
  <rect x="660" y="10" width="130" height="108" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="725" cy="64" r="6" fill="#c9a84c"/>
  <rect x="530" y="128" width="120" height="104" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="590" cy="180" r="6" fill="#c9a84c"/>
  <rect x="660" y="128" width="130" height="104" rx="4" fill="#9a7218" stroke="#7a5810" stroke-width="2"/>
  <circle cx="725" cy="180" r="6" fill="#c9a84c"/>
  <!-- Counter / base cabinets -->
  <rect x="0" y="360" width="800" height="240" fill="#8b6914"/>
