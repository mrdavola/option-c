  <ellipse cx="355" cy="405" rx="22" ry="22" fill="#2a2a3a"/>
  <ellipse cx="355" cy="405" rx="16" ry="16" fill="#3a3a4a" stroke="#1a1a2a" stroke-width="2"/>
  <ellipse cx="355" cy="405" rx="8" ry="8" fill="#2a2a3a"/>
  <ellipse cx="445" cy="405" rx="22" ry="22" fill="#2a2a3a"/>
  <ellipse cx="445" cy="405" rx="16" ry="16" fill="#3a3a4a" stroke="#1a1a2a" stroke-width="2"/>
