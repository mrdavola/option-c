  <ellipse cx="355" cy="388" rx="28" ry="12" fill="#607080"/>
  <rect x="328" y="376" width="54" height="30" rx="4" fill="#708090"/>
  <ellipse cx="355" cy="376" rx="27" ry="10" fill="#607080"/>
