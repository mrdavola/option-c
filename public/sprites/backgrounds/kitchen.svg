  <path d="M340 375 Q335 360 340 350 Q345 340 340 330" fill="none" stroke="#e0e0e0" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <path d="M355 373 Q350 358 355 348 Q360 338 355 328" fill="none" stroke="#e0e0e0" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
  <path d="M370 375 Q375 360 370 350 Q365 340 370 330" fill="none" stroke="#e0e0e0" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <!-- Items on counter -->
  <!-- Fruit bowl -->
  <ellipse cx="120" cy="374" rx="40" ry="12" fill="#e08040"/>
  <circle cx="104" cy="366" r="14" fill="#e63946"/>
  <circle cx="122" cy="363" r="14" fill="#f9ca24"/>
  <circle cx="138" cy="366" r="12" fill="#2d8a1b"/>
  <!-- Cutting board -->
  <rect x="580" y="362" width="100" height="22" rx="4" fill="#c09060"/>
  <!-- Knife on board -->
  <rect x="590" y="366" width="60" height="6" rx="2" fill="#c0c0c0"/>
  <rect x="648" y="364" width="16" height="10" rx="2" fill="#8b6914"/>
  <!-- Cookbook -->
  <rect x="680" y="320" width="80" height="44" rx="3" fill="#e63946"/>
  <rect x="685" y="324" width="70" height="36" rx="2" fill="#ff8888" opacity="0.5"/>
  <line x1="720" y1="324" x2="720" y2="360" stroke="#c82030" stroke-width="2"/>
  <!-- Window in backsplash area -->
  <rect x="300" y="50" width="200" height="180" rx="4" fill="#a8d8f0"/>
  <rect x="300" y="50" width="200" height="180" rx="4" fill="none" stroke="#9a7218" stroke-width="6"/>
  <line x1="400" y1="50" x2="400" y2="230" stroke="#9a7218" stroke-width="4"/>
  <line x1="300" y1="140" x2="500" y2="140" stroke="#9a7218" stroke-width="4"/>
  <!-- Window view (outside) -->
  <rect x="302" y="52" width="96" height="86" fill="#87ceeb"/>
  <rect x="402" y="52" width="96" height="86" fill="#87ceeb"/>
  <rect x="302" y="142" width="96" height="86" fill="#87ceeb"/>
  <rect x="402" y="142" width="96" height="86" fill="#87ceeb"/>
  <!-- Clouds in window -->
  <ellipse cx="360" cy="80" rx="28" ry="14" fill="white" opacity="0.8"/>
  <ellipse cx="348" cy="80" rx="18" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="440" cy="100" rx="24" ry="12" fill="white" opacity="0.8"/>
  <!-- Herbs hanging -->
  <line x1="50" y1="0" x2="50" y2="30" stroke="#6b4226" stroke-width="2"/>
  <ellipse cx="50" cy="40" rx="16" ry="20" fill="#2d8a1b"/>
  <line x1="120" y1="0" x2="120" y2="30" stroke="#6b4226" stroke-width="2"/>
  <ellipse cx="120" cy="42" rx="14" ry="18" fill="#3daa2b"/>
  <line x1="680" y1="0" x2="680" y2="30" stroke="#6b4226" stroke-width="2"/>
  <ellipse cx="680" cy="40" rx="16" ry="20" fill="#2d8a1b"/>
  <line x1="750" y1="0" x2="750" y2="30" stroke="#6b4226" stroke-width="2"/>
  <ellipse cx="750" cy="42" rx="14" ry="18" fill="#3daa2b"/>
  <!-- Floor -->
  <rect x="0" y="580" width="800" height="20" fill="#c8a870"/>
</svg>
