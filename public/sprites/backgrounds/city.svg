<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="citysky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#04001a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0050;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a18;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="600" fill="url(#citysky)"/>
  <!-- Neon sky glow from below -->
  <ellipse cx="400" cy="600" rx="500" ry="200" fill="#9b59b6" opacity="0.12"/>
  <ellipse cx="200" cy="500" rx="200" ry="100" fill="#e63946" opacity="0.08"/>
  <ellipse cx="600" cy="500" rx="200" ry="100" fill="#00f5ff" opacity="0.08"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="130" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="220" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="680" cy="40" r="1" fill="white" opacity="0.6"/>
  <circle cx="750" cy="20" r="1.5" fill="white" opacity="0.5"/>
  <!-- Background buildings (farthest, dark) -->
  <rect x="0" y="200" width="80" height="400" fill="#0a0820"/>
  <rect x="70" y="250" width="60" height="350" fill="#080616"/>
  <rect x="660" y="220" width="80" height="380" fill="#0a0820"/>
  <rect x="730" y="260" width="70" height="340" fill="#080616"/>
  <rect x="350" y="160" width="100" height="440" fill="#0a0820"/>
  <!-- Mid buildings -->
  <rect x="30" y="180" width="100" height="420" fill="#120e28"/>
  <!-- Building windows - grid -->
  <rect x="40" y="200" width="16" height="12" rx="1" fill="#f9ca24" opacity="0.7"/>
  <rect x="62" y="200" width="16" height="12" rx="1" fill="#f9ca24" opacity="0.5"/>
  <rect x="84" y="200" width="16" height="12" rx="1" fill="#4d96ff" opacity="0.6"/>
  <rect x="40" y="222" width="16" height="12" rx="1" fill="#f9ca24" opacity="0.4"/>
  <rect x="62" y="222" width="16" height="12" rx="1" fill="#00f5ff" opacity="0.6"/>
  <rect x="84" y="222" width="16" height="12" rx="1" fill="#f9ca24" opacity="0.5"/>
  <rect x="40" y="244" width="16" height="12" rx="1" fill="#4d96ff" opacity="0.5"/>
  <rect x="84" y="244" width="16" height="12" rx="1" fill="#f9ca24" opacity="0.7"/>
  <!-- Tall center skyscraper -->
  <rect x="340" y="80" width="120" height="520" fill="#16122e"/>
  <!-- Skyscraper facade panels -->
  <rect x="345" y="80" width="52" height="520" fill="#1a1636" opacity="0.6"/>
  <!-- Skyscraper windows (lit) -->
  <rect x="354" y="100" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.8"/>
  <rect x="382" y="100" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.6"/>
  <rect x="354" y="124" width="20" height="14" rx="1" fill="#f9ca24" opacity="0.7"/>
  <rect x="382" y="124" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.8"/>
  <rect x="354" y="148" width="20" height="14" rx="1" fill="#4d96ff" opacity="0.7"/>
  <rect x="382" y="148" width="20" height="14" rx="1" fill="#f9ca24" opacity="0.5"/>
  <rect x="354" y="172" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.6"/>
  <rect x="354" y="196" width="20" height="14" rx="1" fill="#f9ca24" opacity="0.8"/>
  <rect x="382" y="196" width="20" height="14" rx="1" fill="#4d96ff" opacity="0.6"/>
  <rect x="354" y="220" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.7"/>
  <rect x="382" y="220" width="20" height="14" rx="1" fill="#f9ca24" opacity="0.5"/>
  <rect x="354" y="244" width="20" height="14" rx="1" fill="#e63946" opacity="0.7"/>
  <rect x="382" y="244" width="20" height="14" rx="1" fill="#00f5ff" opacity="0.8"/>
  <!-- Antenna on skyscraper with blinking light -->
  <rect x="397" y="50" width="6" height="32" fill="#c0c0c0"/>
  <circle cx="400" cy="48" r="5" fill="#e63946" opacity="0.9"/>
  <circle cx="400" cy="48" r="10" fill="#e63946" opacity="0.2"/>
  <!-- Left mid building -->
  <rect x="140" y="150" width="90" height="450" fill="#100c26"/>
  <!-- Neon sign on left building -->
  <rect x="148" y="220" width="74" height="30" rx="4" fill="none" stroke="#e63946" stroke-width="3"/>
  <rect x="152" y="224" width="66" height="22" rx="3" fill="#e63946" opacity="0.15"/>
  <text x="185" y="240" font-family="monospace" font-size="14" fill="#e63946" text-anchor="middle" opacity="0.9">NEON</text>
  <!-- Windows on left building -->
  <rect x="152" y="170" width="18" height="12" rx="1" fill="#00f5ff" opacity="0.7"/>
  <rect x="178" y="170" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.6"/>
  <rect x="204" y="170" width="18" height="12" rx="1" fill="#00f5ff" opacity="0.5"/>
  <rect x="152" y="192" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.8"/>
  <rect x="204" y="192" width="18" height="12" rx="1" fill="#4d96ff" opacity="0.7"/>
  <rect x="152" y="268" width="18" height="12" rx="1" fill="#4d96ff" opacity="0.6"/>
  <rect x="178" y="268" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.7"/>
  <!-- Right buildings -->
  <rect x="570" y="130" width="100" height="470" fill="#100c26"/>
  <rect x="578" y="160" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.7"/>
  <rect x="604" y="160" width="18" height="12" rx="1" fill="#00f5ff" opacity="0.6"/>
  <rect x="630" y="160" width="18" height="12" rx="1" fill="#e63946" opacity="0.7"/>
  <rect x="578" y="182" width="18" height="12" rx="1" fill="#4d96ff" opacity="0.7"/>
  <rect x="604" y="182" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.5"/>
  <rect x="578" y="204" width="18" height="12" rx="1" fill="#00f5ff" opacity="0.8"/>
  <rect x="630" y="204" width="18" height="12" rx="1" fill="#f9ca24" opacity="0.6"/>
  <!-- Neon holographic billboard -->
  <rect x="460" y="180" width="100" height="60" rx="4" fill="#001a2e" stroke="#00f5ff" stroke-width="2" opacity="0.8"/>
  <text x="510" y="206" font-family="monospace" font-size="11" fill="#00f5ff" text-anchor="middle" opacity="0.9">CYBER</text>
  <text x="510" y="224" font-family="monospace" font-size="11" fill="#9b59b6" text-anchor="middle" opacity="0.9">CITY</text>
  <rect x="460" y="180" width="100" height="60" rx="4" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.4"/>
  <!-- Road / street -->
  <rect x="0" y="500" width="800" height="100" fill="url(#road)"/>
  <!-- Road markings -->
  <rect x="0" y="542" width="800" height="4" fill="#f9ca24" opacity="0.4"/>
  <rect x="60" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="160" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="260" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="360" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="460" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="560" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="660" y="510" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
  <!-- Neon reflections on road -->
  <line x1="200" y1="500" x2="200" y2="600" stroke="#e63946" stroke-width="2" opacity="0.15"/>
  <line x1="400" y1="500" x2="400" y2="600" stroke="#00f5ff" stroke-width="2" opacity="0.12"/>
  <line x1="600" y1="500" x2="600" y2="600" stroke="#9b59b6" stroke-width="2" opacity="0.12"/>
  <!-- Street lights -->
  <line x1="230" y1="400" x2="230" y2="500" stroke="#606080" stroke-width="6"/>
  <path d="M230 400 Q250 390 260 400" fill="none" stroke="#606080" stroke-width="5"/>
  <circle cx="262" cy="402" r="8" fill="#f9ca24" opacity="0.9"/>
  <circle cx="262" cy="402" r="16" fill="#f9ca24" opacity="0.15"/>
  <line x1="570" y1="400" x2="570" y2="500" stroke="#606080" stroke-width="6"/>
  <path d="M570 400 Q550 390 540 400" fill="none" stroke="#606080" stroke-width="5"/>
  <circle cx="538" cy="402" r="8" fill="#f9ca24" opacity="0.9"/>
  <circle cx="538" cy="402" r="16" fill="#f9ca24" opacity="0.15"/>
</svg>
