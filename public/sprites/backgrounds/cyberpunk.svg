<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Distant buildings -->
  <rect x="20" y="180" width="60" height="420" fill="#1a1a30"/>
  <rect x="100" y="120" width="80" height="480" fill="#151528"/>
  <rect x="200" y="200" width="50" height="400" fill="#1a1a30"/>
  <rect x="280" y="100" width="90" height="500" fill="#12122a"/>
  <rect x="400" y="160" width="70" height="440" fill="#1a1a30"/>
  <rect x="500" y="80" width="100" height="520" fill="#151528"/>
  <rect x="620" y="140" width="60" height="460" fill="#1a1a30"/>
  <rect x="700" y="190" width="80" height="410" fill="#12122a"/>
  <!-- Neon window strips -->
  <rect x="110" y="140" width="60" height="3" fill="#ff00ff" opacity="0.6"/>
  <rect x="110" y="200" width="60" height="2" fill="#00ffff" opacity="0.4"/>
  <rect x="110" y="260" width="60" height="2" fill="#ff00ff" opacity="0.3"/>
  <rect x="290" y="120" width="70" height="3" fill="#00ffff" opacity="0.5"/>
  <rect x="290" y="180" width="70" height="2" fill="#ff6600" opacity="0.4"/>
  <rect x="510" y="100" width="80" height="3" fill="#ff00ff" opacity="0.5"/>
  <rect x="510" y="160" width="80" height="2" fill="#00ffff" opacity="0.4"/>
  <rect x="510" y="220" width="80" height="2" fill="#ff00ff" opacity="0.3"/>
  <!-- Window dots -->
  <rect x="30" y="220" width="4" height="4" fill="#ff0" opacity="0.3"/>
  <rect x="42" y="220" width="4" height="4" fill="#ff0" opacity="0.2"/>
  <rect x="30" y="260" width="4" height="4" fill="#ff0" opacity="0.2"/>
  <rect x="42" y="300" width="4" height="4" fill="#ff0" opacity="0.3"/>
  <rect x="710" y="220" width="4" height="4" fill="#ff0" opacity="0.2"/>
  <rect x="722" y="260" width="4" height="4" fill="#ff0" opacity="0.3"/>
  <!-- Ground / wet street -->
  <rect x="0" y="520" width="800" height="80" fill="#0d0d20"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
  <!-- Neon reflections on ground -->
  <rect x="100" y="540" width="80" height="2" fill="#ff00ff" opacity="0.15"/>
  <rect x="500" y="550" width="100" height="2" fill="#00ffff" opacity="0.1"/>
  <!-- Rain -->
  <line x1="150" y1="0" x2="145" y2="30" stroke="rgba(150,200,255,0.15)" stroke-width="1"/>
  <line x1="350" y1="50" x2="345" y2="80" stroke="rgba(150,200,255,0.1)" stroke-width="1"/>
  <line x1="550" y1="20" x2="545" y2="50" stroke="rgba(150,200,255,0.12)" stroke-width="1"/>
  <line x1="680" y1="60" x2="675" y2="90" stroke="rgba(150,200,255,0.1)" stroke-width="1"/>
</svg>
