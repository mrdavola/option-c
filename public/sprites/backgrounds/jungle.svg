  <path d="M130 180 Q138 260 128 340 Q135 420 126 500" fill="none" stroke="#3d6a1b" stroke-width="4" stroke-linecap="round"/>
  <path d="M160 190 Q154 270 162 350" fill="none" stroke="#3d6a1b" stroke-width="3" stroke-linecap="round"/>
  <path d="M660 185 Q670 270 658 355 Q665 435 655 515" fill="none" stroke="#3d6a1b" stroke-width="4" stroke-linecap="round"/>
  <path d="M340 180 Q352 260 342 340" fill="none" stroke="#2d5a10" stroke-width="3" stroke-linecap="round"/>
  <path d="M500 185 Q512 265 504 345" fill="none" stroke="#2d5a10" stroke-width="3" stroke-linecap="round"/>
