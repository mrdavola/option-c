  <rect x="200" y="200" width="50" height="400" rx="6" fill="#3d2a18"/>
  <ellipse cx="225" cy="200" rx="80" ry="55" fill="#1e5a0e"/>
  <ellipse cx="210" cy="168" rx="65" ry="44" fill="#236a12"/>
