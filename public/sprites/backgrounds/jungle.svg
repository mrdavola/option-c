  <ellipse cx="138" cy="280" rx="20" ry="12" fill="#2d8a1b" transform="rotate(-30,138,280)"/>
  <ellipse cx="126" cy="380" rx="18" ry="10" fill="#3daa2b" transform="rotate(20,126,380)"/>
  <ellipse cx="658" cy="310" rx="20" ry="12" fill="#2d8a1b" transform="rotate(30,658,310)"/>
