  <path d="M0 350 Q60 290 100 340 Q80 380 40 400 Z" fill="#2d8a1b"/>
  <path d="M0 420 Q50 370 90 410 Q70 450 30 465 Z" fill="#3daa2b"/>
  <path d="M720 370 Q760 310 800 350 L800 420 Q770 420 740 390 Z" fill="#2d8a1b"/>
  <path d="M710 450 Q750 400 800 430 L800 490 Q770 490 730 465 Z" fill="#3daa2b"/>
  <!-- Large palm leaves center -->
  <path d="M400 300 Q340 240 300 260 Q320 300 360 310 Z" fill="#2d8a1b"/>
  <path d="M400 300 Q460 240 500 260 Q480 300 440 310 Z" fill="#3daa2b"/>
  <path d="M400 300 Q380 230 390 200 Q405 225 410 260 Z" fill="#236a12"/>
  <!-- Flowers on vines -->
  <circle cx="347" cy="350" r="8" fill="#e63946"/>
  <circle cx="347" cy="350" r="4" fill="#f9ca24"/>
  <circle cx="508" cy="340" r="7" fill="#ff69b4"/>
  <circle cx="508" cy="340" r="3.5" fill="white"/>
  <circle cx="140" cy="410" r="9" fill="#ff8c00"/>
  <circle cx="140" cy="410" r="4" fill="#f9ca24"/>
  <!-- Exotic birds -->
  <!-- Parrot left -->
  <ellipse cx="260" cy="240" rx="14" ry="20" fill="#e63946"/>
  <ellipse cx="266" cy="238" rx="8" ry="12" fill="#2d8a1b"/>
  <circle cx="268" cy="232" r="10" fill="#e63946"/>
  <path d="M274 230 Q282 228 280 234" fill="#f9ca24" stroke="#e8a000" stroke-width="1"/>
  <!-- Parrot tail -->
  <path d="M260 258 Q254 278 252 290" fill="none" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
  <path d="M262 260 Q258 280 256 292" fill="none" stroke="#4d96ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Toucan right -->
  <ellipse cx="540" cy="250" rx="14" ry="18" fill="#2b2d42"/>
  <ellipse cx="546" cy="248" rx="8" ry="11" fill="#f9ca24"/>
  <circle cx="548" cy="243" r="10" fill="#2b2d42"/>
  <path d="M556 238 Q574 234 575 242 Q574 250 556 248 Z" fill="#f9ca24"/>
  <path d="M557 240 Q572 236 570 242" fill="none" stroke="#e63946" stroke-width="3"/>
  <!-- Ground and roots -->
  <path d="M0 500 Q100 488 200 496 Q300 504 400 492 Q500 480 600 492 Q700 504 800 492 L800 600 L0 600 Z" fill="url(#junglefloor)"/>
  <!-- Ground foliage -->
  <ellipse cx="180" cy="516" rx="80" ry="28" fill="#1a4a0a"/>
  <ellipse cx="400" cy="510" rx="100" ry="32" fill="#1e5a0e"/>
  <ellipse cx="620" cy="518" rx="80" ry="28" fill="#1a4a0a"/>
  <!-- Glowing mushrooms -->
  <circle cx="310" cy="502" r="10" fill="#aaf04a" opacity="0.7"/>
  <circle cx="310" cy="492" r="18" fill="#6bcb77" opacity="0.6"/>
  <circle cx="490" cy="506" r="8" fill="#aaf04a" opacity="0.65"/>
  <circle cx="490" cy="497" r="15" fill="#6bcb77" opacity="0.55"/>
  <!-- Water trickle -->
  <path d="M400 400 Q395 430 398 460 Q402 490 400 520" fill="none" stroke="#4d96ff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Fireflies -->
  <circle cx="320" cy="440" r="3" fill="#f9ca24" opacity="0.8"/>
  <circle cx="320" cy="440" r="8" fill="#f9ca24" opacity="0.2"/>
  <circle cx="470" cy="460" r="2.5" fill="#aaf04a" opacity="0.7"/>
  <circle cx="470" cy="460" r="7" fill="#aaf04a" opacity="0.15"/>
</svg>
