<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="junglesky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004d1a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1a6e2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d8a3a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="junglefloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a08;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1a04;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="sunlight" cx="60%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#f9ca24;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f9ca24;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Dense canopy sky -->
  <rect width="800" height="600" fill="url(#junglesky)"/>
  <!-- Sunlight filtering through -->
  <ellipse cx="480" cy="120" rx="300" ry="250" fill="url(#sunlight)"/>
  <!-- Light shafts through canopy -->
  <polygon points="380,0 390,0 440,300 430,300" fill="#f9ca24" opacity="0.06"/>
  <polygon points="480,0 490,0 520,250 510,250" fill="#f9ca24" opacity="0.05"/>
  <polygon points="200,0 210,0 260,280 250,280" fill="#f9ca24" opacity="0.04"/>
  <!-- Background jungle (darkest layer) -->
  <!-- Dense back trees -->
  <rect x="0" y="100" width="80" height="500" fill="#003a0a"/>
  <rect x="720" y="120" width="80" height="480" fill="#003a0a"/>
  <ellipse cx="40" cy="100" rx="80" ry="100" fill="#004d12"/>
  <ellipse cx="760" cy="120" rx="80" ry="95" fill="#004d12"/>
  <!-- Canopy layer (top) -->
  <path d="M0 0 Q40 -20 80 10 Q120 -10 160 15 Q200 -5 240 20 Q280 0 320 18 Q360 -8 400 12 Q440 -5 480 16 Q520 0 560 14 Q600 -8 640 10 Q680 -5 720 12 Q760 0 800 15 L800 180 L0 180 Z" fill="#004d12"/>
  <path d="M0 40 Q50 15 100 45 Q150 20 200 48 Q250 22 300 50 Q350 18 400 46 Q450 20 500 48 Q550 16 600 44 Q650 18 700 46 Q750 20 800 44 L800 200 L0 200 Z" fill="#1a6e2a"/>
  <path d="M0 80 Q60 55 120 82 Q180 55 240 84 Q300 55 360 82 Q420 52 480 80 Q540 52 600 80 Q660 52 720 80 Q760 58 800 78 L800 220 L0 220 Z" fill="#236a1e"/>
  <!-- Individual large tropical leaves (canopy) -->
  <path d="M-20 100 Q30 60 80 90 Q50 110 20 120 Z" fill="#1a6e2a"/>
  <path d="M80 50 Q130 20 180 55 Q150 70 110 78 Z" fill="#2d8a3a"/>
  <path d="M300 30 Q360 0 400 40 Q370 55 330 62 Z" fill="#1a6e2a"/>
  <path d="M500 20 Q560 -5 600 35 Q568 48 530 55 Z" fill="#2d8a3a"/>
  <path d="M700 40 Q750 10 800 50 Q768 65 728 70 Z" fill="#1a6e2a"/>
  <!-- Big jungle trees (trunks) -->
  <!-- Left massive tree -->
  <rect x="50" y="150" width="80" height="450" rx="10" fill="#2d1a08"/>
  <path d="M60 200 Q70 225 60 250 Q70 275 60 300" fill="none" stroke="#3d2a18" stroke-width="4" opacity="0.6"/>
  <path d="M110 210 Q100 238 110 268" fill="none" stroke="#3d2a18" stroke-width="3" opacity="0.5"/>
  <!-- Left tree canopy (sprawling) -->
  <ellipse cx="90" cy="155" rx="120" ry="70" fill="#1a4a0a"/>
  <ellipse cx="60" cy="120" rx="90" ry="60" fill="#1e5a0e"/>
  <ellipse cx="120" cy="100" rx="100" ry="58" fill="#236a12"/>
  <ellipse cx="75" cy="75" rx="80" ry="52" fill="#2d8a1b"/>
  <!-- Right massive tree -->
  <rect x="670" y="150" width="80" height="450" rx="10" fill="#2d1a08"/>
  <ellipse cx="710" cy="155" rx="120" ry="70" fill="#1a4a0a"/>
  <ellipse cx="740" cy="120" rx="90" ry="60" fill="#1e5a0e"/>
  <ellipse cx="690" cy="100" rx="100" ry="58" fill="#236a12"/>
  <ellipse cx="725" cy="75" rx="80" ry="52" fill="#2d8a1b"/>
