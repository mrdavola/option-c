  <path d="M96 130 Q72 160 68 185" fill="none" stroke="#4a148c" stroke-width="11" stroke-linecap="round"/>
  <path d="M160 130 Q178 155 175 180" fill="none" stroke="#4a148c" stroke-width="11" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="66" cy="188" r="7" fill="#d4a574"/>
  <circle cx="176" cy="183" r="7" fill="#d4a574"/>
  <!-- Guitar body -->
  <ellipse cx="120" cy="200" rx="32" ry="22" fill="#8d6e63"/>
  <ellipse cx="120" cy="200" rx="8" ry="8" fill="#5d4037"/>
  <!-- Guitar neck -->
  <rect x="58" y="145" width="6" height="60" rx="2" fill="#8d6e63" transform="rotate(-15,61,175)"/>
  <!-- Guitar strings -->
  <line x1="66" y1="148" x2="118" y2="192" stroke="#ddd" stroke-width="0.5" opacity="0.6"/>
  <line x1="64" y1="150" x2="116" y2="194" stroke="#ddd" stroke-width="0.5" opacity="0.5"/>
  <!-- Guitar headstock -->
  <rect x="46" y="130" width="14" height="16" rx="4" fill="#5d4037" transform="rotate(-15,53,138)"/>
  <!-- Head -->
  <circle cx="128" cy="86" r="30" fill="#d4a574"/>
  <!-- Spiky/messy hair -->
  <path d="M98 76 Q104 44 120 48 Q128 38 136 48 Q152 44 158 76" fill="#1a1a1a"/>
  <path d="M96 76 Q92 60 100 55" fill="#1a1a1a"/>
  <path d="M160 76 Q164 60 156 55" fill="#1a1a1a"/>
  <!-- Face -->
  <circle cx="118" cy="86" r="3" fill="#333"/>
  <circle cx="138" cy="86" r="3" fill="#333"/>
  <path d="M120 100 Q128 105 136 100" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
  <!-- Music notes -->
  <text x="180" y="100" font-size="20" fill="#f9ca24" opacity="0.7">♪</text>
  <text x="195" y="80" font-size="16" fill="#f9ca24" opacity="0.5">♫</text>
  <text x="70" y="120" font-size="14" fill="#f9ca24" opacity="0.5">♪</text>
