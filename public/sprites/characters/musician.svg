<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Shadow -->
  <ellipse cx="128" cy="245" rx="45" ry="10" fill="#000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="112" y="200" width="12" height="42" rx="5" fill="#1a1a1a"/>
  <rect x="132" y="200" width="12" height="42" rx="5" fill="#1a1a1a"/>
  <!-- Boots -->
  <ellipse cx="118" cy="244" rx="12" ry="5" fill="#1a1a1a"/>
  <ellipse cx="138" cy="244" rx="12" ry="5" fill="#1a1a1a"/>
  <!-- Body / jacket -->
  <path d="M96 120 L160 120 L164 205 Q128 212 92 205 Z" fill="#4a148c"/>
  <!-- Jacket lapels -->
  <path d="M118 120 L128 150 L138 120" fill="#6a1b9a" opacity="0.6"/>
