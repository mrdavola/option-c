<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Body / apron -->
  <rect x="82" y="128" width="92" height="96" rx="8" fill="white"/>
  <!-- Apron bib -->
  <path d="M104 128 L152 128 L158 200 L98 200 Z" fill="#e8e8e8"/>
  <!-- Apron strings -->
  <path d="M104 140 Q80 148 72 165" fill="none" stroke="#ddd" stroke-width="6"/>
  <path d="M152 140 Q176 148 184 165" fill="none" stroke="#ddd" stroke-width="6"/>
  <!-- Chef jacket -->
  <rect x="82" y="128" width="40" height="96" rx="6" fill="white"/>
  <rect x="134" y="128" width="40" height="96" rx="6" fill="white"/>
  <!-- Jacket buttons -->
  <circle cx="110" cy="148" r="4" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <circle cx="110" cy="163" r="4" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <circle cx="110" cy="178" r="4" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <!-- Neckerchief -->
  <path d="M108 128 L128 138 L148 128 L140 122 L116 122 Z" fill="#e63946"/>
  <!-- Head -->
  <ellipse cx="128" cy="95" rx="38" ry="40" fill="#f4a261"/>
  <!-- Face features -->
  <!-- Eyes -->
  <circle cx="114" cy="90" r="6" fill="white"/>
  <circle cx="142" cy="90" r="6" fill="white"/>
  <circle cx="116" cy="92" r="3.5" fill="#2b2d42"/>
  <circle cx="144" cy="92" r="3.5" fill="#2b2d42"/>
  <circle cx="117" cy="91" r="1.5" fill="white"/>
  <circle cx="145" cy="91" r="1.5" fill="white"/>
  <!-- Eyebrows (expressive) -->
  <path d="M108 82 Q114 78 120 82" fill="none" stroke="#8b6914" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M136 82 Q142 78 148 82" fill="none" stroke="#8b6914" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="104" cy="103" r="10" fill="#ff9a9a" opacity="0.4"/>
  <circle cx="152" cy="103" r="10" fill="#ff9a9a" opacity="0.4"/>
  <!-- Nose -->
  <circle cx="128" cy="103" r="5" fill="#e08a5a"/>
  <!-- Big smile / mustache -->
  <path d="M112 112 Q120 108 128 110 Q136 108 144 112" fill="#5a3a10" stroke="#5a3a10" stroke-width="3" stroke-linecap="round"/>
  <path d="M112 116 Q128 128 144 116" fill="none" stroke="#c06030" stroke-width="2.5"/>
  <!-- Toque (chef hat) -->
  <rect x="92" y="56" width="72" height="12" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Puffy top of hat -->
  <ellipse cx="128" cy="40" rx="44" ry="28" fill="white"/>
  <ellipse cx="108" cy="34" rx="18" ry="14" fill="white"/>
  <ellipse cx="148" cy="34" rx="18" ry="14" fill="white"/>
  <ellipse cx="128" cy="30" rx="22" ry="16" fill="white"/>
  <ellipse cx="128" cy="42" rx="40" ry="20" fill="white"/>
  <!-- Hat band -->
  <rect x="90" y="56" width="76" height="14" rx="4" fill="#e0e0e0"/>
  <!-- Arms -->
  <rect x="44" y="135" width="40" height="18" rx="9" fill="white"/>
  <rect x="40" y="150" width="36" height="16" rx="8" fill="white"/>
  <!-- Ladle / spoon in left hand -->
  <circle cx="36" cy="174" r="12" fill="#c0c0c0"/>
  <line x1="36" y1="186" x2="30" y2="220" stroke="#a0a0a0" stroke-width="5" stroke-linecap="round"/>
  <rect x="172" y="135" width="40" height="18" rx="9" fill="white"/>
  <rect x="180" y="150" width="36" height="16" rx="8" fill="white"/>
  <!-- Rolling pin in right hand -->
  <rect x="185" y="165" width="50" height="10" rx="5" fill="#c09060"/>
  <rect x="184" y="163" width="10" height="14" rx="4" fill="#a07040"/>
  <rect x="234" y="163" width="10" height="14" rx="4" fill="#a07040"/>
  <!-- Legs -->
  <rect x="90" y="222" width="28" height="30" rx="8" fill="#2b2d42"/>
  <rect x="138" y="222" width="28" height="30" rx="8" fill="#2b2d42"/>
  <!-- Shoes -->
  <ellipse cx="104" cy="252" rx="20" ry="8" fill="#1a1a2e"/>
  <ellipse cx="152" cy="252" rx="20" ry="8" fill="#1a1a2e"/>
</svg>
