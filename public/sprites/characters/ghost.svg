  <path d="M60 110 Q58 80 70 62 Q82 40 104 30 Q116 24 128 24 Q140 24 152 30 Q174 40 186 62 Q198 80 196 110 L196 200 Q180 188 166 200 Q152 212 140 200 Q128 188 116 200 Q104 212 90 200 Q76 188 60 200 Z" fill="#c8e6f0"/>
