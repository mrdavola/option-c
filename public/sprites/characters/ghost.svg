  <path d="M42 80 L44 74 L46 80 L52 82 L46 84 L44 90 L42 84 L36 82 Z" fill="#7ec8e3" opacity="0.6"/>
  <path d="M204 90 L206 84 L208 90 L214 92 L208 94 L206 100 L204 94 L198 92 Z" fill="#7ec8e3" opacity="0.6"/>
  <path d="M80 240 L82 234 L84 240 L90 242 L84 244 L82 250 L80 244 L74 242 Z" fill="#7ec8e3" opacity="0.5"/>
  <!-- Wavy bottom -->
  <path d="M60 190 Q70 180 80 190 Q90 200 100 190 Q110 180 120 190 Q130 200 140 190 Q150 180 160 190 Q170 200 180 190 Q190 180 196 190" fill="none" stroke="#a8d8ec" stroke-width="3"/>
</svg>
