  <path d="M72 100 Q72 70 82 52 Q94 36 128 30 Q120 40 115 60 Q110 80 110 105 Z" fill="white" opacity="0.3"/>
  <!-- Eyes -->
  <ellipse cx="104" cy="108" rx="18" ry="20" fill="#1a1a4e"/>
  <ellipse cx="152" cy="108" rx="18" ry="20" fill="#1a1a4e"/>
  <!-- Eye shine -->
  <circle cx="110" cy="102" r="6" fill="white"/>
  <circle cx="158" cy="102" r="6" fill="white"/>
  <circle cx="114" cy="105" r="2.5" fill="#7ec8e3"/>
  <circle cx="162" cy="105" r="2.5" fill="#7ec8e3"/>
  <!-- Spooky mouth -->
  <path d="M104 135 Q114 145 128 138 Q142 145 152 135" fill="#1a1a4e"/>
  <path d="M108 135 L112 142 L120 136 L128 143 L136 136 L144 142 L148 135" fill="#1a1a4e"/>
  <!-- Cheek blush (cute) -->
  <circle cx="90" cy="125" r="12" fill="#b0d8f0" opacity="0.6"/>
  <circle cx="166" cy="125" r="12" fill="#b0d8f0" opacity="0.6"/>
  <!-- Floating wisps -->
  <path d="M58 158 Q44 150 38 160 Q44 170 58 164" fill="#c8e6f0" opacity="0.7"/>
  <path d="M198 158 Q212 150 218 160 Q212 170 198 164" fill="#c8e6f0" opacity="0.7"/>
  <!-- Chain (being haunted accessory) -->
  <circle cx="128" cy="60" r="5" fill="#c0c0c0" opacity="0.6"/>
  <circle cx="140" cy="62" r="5" fill="#c0c0c0" opacity="0.6"/>
  <circle cx="120" cy="62" r="5" fill="#c0c0c0" opacity="0.6"/>
