<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Wetsuit body -->
  <rect x="80" y="130" width="96" height="96" rx="12" fill="#1a3a5c"/>
  <!-- Wetsuit highlights/panels -->
  <rect x="88" y="136" width="42" height="84" rx="8" fill="#1e4470"/>
  <rect x="140" y="155" width="30" height="65" rx="8" fill="#1e4470"/>
  <!-- Yellow trim stripes -->
  <rect x="80" y="155" width="96" height="8" fill="#f9ca24"/>
  <rect x="80" y="195" width="96" height="6" fill="#f9ca24"/>
  <!-- Tank / oxygen cylinder -->
  <rect x="155" y="138" width="26" height="64" rx="10" fill="#c0c0c0"/>
  <rect x="157" y="136" width="22" height="10" rx="5" fill="#a0a0a0"/>
  <!-- Tank valve -->
  <rect x="162" y="128" width="12" height="10" rx="3" fill="#808080"/>
  <!-- Regulator hose -->
  <path d="M168 138 Q175 148 175 158 Q175 168 165 170" fill="none" stroke="#404040" stroke-width="5" stroke-linecap="round"/>
  <!-- Mask / head -->
  <ellipse cx="118" cy="88" rx="42" ry="44" fill="#1a3a5c"/>
  <!-- Face mask -->
  <ellipse cx="118" cy="90" rx="34" ry="34" fill="#2a5a8c"/>
  <!-- Mask glass/lens -->
  <ellipse cx="118" cy="90" rx="28" ry="26" fill="#00a8cc" opacity="0.7"/>
  <!-- Reflection on mask -->
  <path d="M96 76 Q104 70 118 72 Q110 80 100 82 Z" fill="white" opacity="0.3"/>
  <!-- Eyes behind mask -->
  <circle cx="108" cy="88" r="7" fill="white" opacity="0.85"/>
  <circle cx="130" cy="88" r="7" fill="white" opacity="0.85"/>
  <circle cx="110" cy="90" r="4" fill="#2b2d42"/>
  <circle cx="132" cy="90" r="4" fill="#2b2d42"/>
  <circle cx="111" cy="89" r="1.5" fill="white"/>
  <circle cx="133" cy="89" r="1.5" fill="white"/>
  <!-- Mask strap -->
  <path d="M84 80 Q76 88 80 100" fill="none" stroke="#1a3a5c" stroke-width="6"/>
  <path d="M152 80 Q160 88 156 100" fill="none" stroke="#1a3a5c" stroke-width="6"/>
  <!-- Regulator mouthpiece -->
  <rect x="104" y="108" width="28" height="14" rx="6" fill="#404040"/>
  <rect x="108" y="110" width="20" height="10" rx="4" fill="#606060"/>
  <!-- Snorkel/regulator tube -->
  <path d="M88 84 Q68 80 62 68 Q58 58 64 50" fill="none" stroke="#f9ca24" stroke-width="5" stroke-linecap="round"/>
  <rect x="60" y="44" width="10" height="8" rx="3" fill="#f9ca24"/>
  <!-- Fins / hands -->
  <!-- Left arm -->
  <rect x="44" y="140" width="38" height="18" rx="9" fill="#1a3a5c"/>
  <rect x="38" y="155" width="36" height="14" rx="7" fill="#1e4470"/>
  <!-- Left fin (hand) -->
  <path d="M28 160 Q20 155 18 168 Q20 178 36 176 L38 162 Z" fill="#1e4470"/>
  <!-- Right arm -->
  <rect x="174" y="140" width="38" height="18" rx="9" fill="#1a3a5c"/>
  <rect x="182" y="155" width="36" height="14" rx="7" fill="#1e4470"/>
  <!-- Right fin (hand) -->
  <path d="M228 160 Q236 155 238 168 Q236 178 220 176 L218 162 Z" fill="#1e4470"/>
  <!-- Legs -->
  <rect x="88" y="224" width="32" height="26" rx="8" fill="#1a3a5c"/>
  <rect x="136" y="224" width="32" height="26" rx="8" fill="#1a3a5c"/>
  <!-- Flippers (feet) -->
  <path d="M76 248 Q60 250 56 244 Q60 238 88 240 L90 254 Z" fill="#1e4470"/>
  <path d="M180 248 Q196 250 200 244 Q196 238 168 240 L166 254 Z" fill="#1e4470"/>
  <!-- Bubble trail -->
  <circle cx="60" cy="120" r="5" fill="#00a8cc" opacity="0.4"/>
  <circle cx="54" cy="105" r="4" fill="#00a8cc" opacity="0.3"/>
  <circle cx="62" cy="90" r="6" fill="#00a8cc" opacity="0.35"/>
  <circle cx="52" cy="75" r="3" fill="#00a8cc" opacity="0.25"/>
</svg>
