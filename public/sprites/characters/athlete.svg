<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Shadow -->
  <ellipse cx="128" cy="245" rx="50" ry="10" fill="#000" opacity="0.15"/>
  <!-- Legs in running pose -->
  <path d="M118 195 L100 235 L90 238" fill="none" stroke="#d4a574" stroke-width="10" stroke-linecap="round"/>
  <path d="M138 195 L160 230 L172 228" fill="none" stroke="#d4a574" stroke-width="10" stroke-linecap="round"/>
  <!-- Running shoes -->
  <path d="M80 236 L92 234 L95 240 L78 242 Z" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <path d="M162 226 L174 224 L177 230 L160 232 Z" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <rect x="82" y="237" width="4" height="3" rx="1" fill="#fff"/>
  <rect x="164" y="227" width="4" height="3" rx="1" fill="#fff"/>
  <!-- Shorts -->
  <path d="M104 175 L152 175 L156 200 Q128 208 100 200 Z" fill="#1565c0"/>
  <line x1="128" y1="175" x2="128" y2="200" stroke="#0d47a1" stroke-width="1"/>
  <!-- Jersey body -->
  <path d="M100 120 L156 120 L156 178 Q128 185 100 178 Z" fill="#ff6f00"/>
  <!-- Jersey number -->
  <text x="128" y="158" font-family="sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">7</text>
  <!-- Stripe -->
  <rect x="100" y="140" width="56" height="4" fill="#fff" opacity="0.3"/>
  <!-- Arms running pose -->
  <path d="M100 130 Q75 140 65 160" fill="none" stroke="#d4a574" stroke-width="9" stroke-linecap="round"/>
  <path d="M156 130 Q180 120 185 100" fill="none" stroke="#d4a574" stroke-width="9" stroke-linecap="round"/>
  <!-- Fists -->
  <circle cx="63" cy="163" r="7" fill="#d4a574"/>
  <circle cx="187" cy="98" r="7" fill="#d4a574"/>
  <!-- Head -->
  <circle cx="128" cy="88" r="30" fill="#d4a574"/>
  <!-- Short hair -->
  <path d="M98 80 Q100 55 128 52 Q156 55 158 80" fill="#333"/>
  <!-- Headband -->
  <rect x="96" y="72" width="64" height="8" rx="3" fill="#e53935"/>
  <!-- Face -->
  <circle cx="118" cy="88" r="3" fill="#333"/>
  <circle cx="138" cy="88" r="3" fill="#333"/>
  <path d="M118 100 Q128 106 138 100" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M160 78 Q162 72 164 78 Q162 82 160 78 Z" fill="#64b5f6" opacity="0.6"/>
  <!-- Motion lines -->
  <line x1="50" y1="130" x2="30" y2="130" stroke="#999" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="55" y1="150" x2="35" y2="150" stroke="#999" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="52" y1="170" x2="38" y2="170" stroke="#999" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</svg>
