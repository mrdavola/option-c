<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Suit body (torso) -->
  <rect x="76" y="130" width="104" height="95" rx="20" fill="#e8e8f0"/>
  <!-- Suit shading -->
  <rect x="84" y="138" width="88" height="80" rx="15" fill="#f5f5ff"/>
  <!-- NASA-style patch -->
  <circle cx="128" cy="162" r="18" fill="#003087"/>
  <path d="M116 158 L128 148 L140 158 L136 172 L120 172 Z" fill="#fc3d21"/>
  <circle cx="128" cy="162" r="8" fill="white"/>
  <!-- Backpack / life support -->
  <rect x="86" y="195" width="84" height="24" rx="6" fill="#c0c0d0"/>
  <rect x="96" y="199" width="20" height="10" rx="3" fill="#4a90d9"/>
  <rect x="122" y="199" width="20" height="10" rx="3" fill="#4a90d9"/>
  <rect x="148" y="199" width="14" height="10" rx="3" fill="#ff6b6b"/>
