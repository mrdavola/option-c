  <circle cx="116" cy="88" r="5" fill="white" opacity="0.8"/>
  <circle cx="140" cy="88" r="5" fill="white" opacity="0.8"/>
  <circle cx="118" cy="90" r="2.5" fill="#333" opacity="0.8"/>
  <circle cx="142" cy="90" r="2.5" fill="#333" opacity="0.8"/>
  <path d="M118 100 Q128 107 138 100" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- Helmet ring connector -->
  <rect x="80" y="135" width="96" height="12" rx="6" fill="#b0b0c0"/>
  <!-- Arms / gloves -->
  <rect x="38" y="138" width="40" height="22" rx="11" fill="#e0e0f0"/>
  <rect x="34" y="158" width="38" height="18" rx="9" fill="#d0d0e0"/>
  <ellipse cx="36" cy="175" rx="16" ry="10" fill="#c0c0d0"/>
  <rect x="178" y="138" width="40" height="22" rx="11" fill="#e0e0f0"/>
  <rect x="184" y="158" width="38" height="18" rx="9" fill="#d0d0e0"/>
  <ellipse cx="220" cy="175" rx="16" ry="10" fill="#c0c0d0"/>
  <!-- Legs -->
  <rect x="88" y="222" width="34" height="30" rx="10" fill="#d8d8e8"/>
  <rect x="134" y="222" width="34" height="30" rx="10" fill="#d8d8e8"/>
  <!-- Boots -->
  <ellipse cx="105" cy="252" rx="22" ry="9" fill="#a0a0b8"/>
  <ellipse cx="151" cy="252" rx="22" ry="9" fill="#a0a0b8"/>
  <!-- Flag patch on arm -->
  <rect x="41" y="145" width="16" height="10" rx="1" fill="#fc3d21"/>
  <rect x="41" y="145" width="16" height="4" rx="1" fill="#fc3d21"/>
  <rect x="41" y="149" width="16" height="3" fill="white"/>
  <rect x="41" y="152" width="16" height="3" fill="#003087"/>
